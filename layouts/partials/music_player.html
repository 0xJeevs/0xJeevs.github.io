<!-- Music Player Floating Widget -->
<div id="music-player-widget" class="fixed bottom-5 right-5 z-50 font-sans transition-all duration-300">
    <!-- Collapsed Toggle Disk Button (when minimized) -->
    <button id="music-expand-btn" onclick="toggleMusicPlayer(true)" class="hidden flex items-center gap-2 bg-[#18181b]/90 text-pink-400 hover:text-pink-300 border border-pink-500/40 hover:border-pink-400 p-3 rounded-full shadow-2xl backdrop-blur-md transition-all duration-300 hover:scale-105 group" title="Open Music Player">
        <span class="relative flex h-3 w-3">
          <span id="music-pulse-dot" class="animate-ping absolute inline-flex h-full w-full rounded-full bg-pink-400 opacity-75 hidden"></span>
          <span class="relative inline-flex rounded-full h-3 w-3 bg-pink-500"></span>
        </span>
        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 animate-spin-slow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 18V5l12-2v13"></path>
            <circle cx="6" cy="18" r="3"></circle>
            <circle cx="18" cy="16" r="3"></circle>
        </svg>
    </button>

    <!-- Expanded Music Card -->
    <div id="music-card" class="w-80 bg-[#18181b]/95 text-white border border-gray-700/80 rounded-2xl p-4 shadow-2xl backdrop-blur-md transition-all duration-300 relative">
        <!-- Close/Minimize Header Button -->
        <div class="flex items-center justify-between mb-3">
            <div class="flex items-center gap-2">
                <!-- Equalizer Animation -->
                <div id="eq-bars" class="flex items-end gap-[3px] h-4">
                    <span class="w-[3px] bg-pink-400 rounded-full h-2 eq-bar"></span>
                    <span class="w-[3px] bg-pink-400 rounded-full h-4 eq-bar"></span>
                    <span class="w-[3px] bg-pink-400 rounded-full h-3 eq-bar"></span>
                </div>
                <span class="text-xs font-bold uppercase tracking-wider text-pink-400">Audio Player</span>
            </div>
            <button onclick="toggleMusicPlayer(false)" class="text-gray-400 hover:text-white transition-colors p-1" title="Minimize">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 12H6"/></svg>
            </button>
        </div>

        <!-- Track Info -->
        <div class="mb-3">
            <div id="track-name" class="font-semibold text-sm truncate text-gray-100">Lofi Cyber Stream</div>
            <div id="track-artist" class="text-xs text-gray-400 truncate">Chill Beats & DevSecOps Synth</div>
        </div>

        <!-- Scrub Progress Bar -->
        <div class="mb-3">
            <input id="audio-progress" type="range" min="0" max="100" value="0" class="w-full h-1.5 bg-gray-700 rounded-lg appearance-none cursor-pointer accent-pink-500">
            <div class="flex justify-between text-[10px] text-gray-400 mt-1">
                <span id="current-time">00:00</span>
                <span id="duration-time">LIVE</span>
            </div>
        </div>

        <!-- Controls Row -->
        <div class="flex items-center justify-between">
            <!-- Playlist Select -->
            <select id="playlist-select" onchange="changeTrack(this.value)" class="bg-[#27272a] text-xs text-gray-200 border border-gray-700 rounded-lg px-2 py-1 focus:outline-none focus:border-pink-500 max-w-[130px] truncate">
                <option value="0">🎵 Lofi Chill Radio</option>
                <option value="1">⚡ Synthwave Cyber</option>
                <option value="2">🌌 Ambient Coding</option>
            </select>

            <!-- Main Play / Next Controls -->
            <div class="flex items-center gap-2">
                <button id="play-btn" onclick="togglePlay()" class="bg-pink-500 hover:bg-pink-400 text-white p-2.5 rounded-full transition-transform transform hover:scale-105 active:scale-95 shadow-md" title="Play/Pause">
                    <!-- Play Icon -->
                    <svg id="play-icon" class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                    <!-- Pause Icon -->
                    <svg id="pause-icon" class="w-4 h-4 hidden" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                </button>
                <button onclick="nextTrack()" class="text-gray-400 hover:text-white p-1.5 transition-colors" title="Next Track">
                    <svg class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
                </button>
            </div>

            <!-- Volume Button -->
            <button id="mute-btn" onclick="toggleMute()" class="text-gray-400 hover:text-white p-1 transition-colors" title="Mute/Unmute">
                <svg id="vol-icon" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 5L6 9H2v6h4l5 4V5zM15.54 8.46a5 5 0 010 7.07"/></svg>
            </button>
        </div>
    </div>
</div>

<audio id="audio-element" preload="none"></audio>

<style>
.eq-bar {
    animation: eqBounce 0.8s ease-in-out infinite alternate;
    animation-play-state: paused;
}
.playing .eq-bar {
    animation-play-state: running;
}
.eq-bar:nth-child(2) { animation-delay: 0.2s; }
.eq-bar:nth-child(3) { animation-delay: 0.4s; }

@keyframes eqBounce {
    0% { height: 4px; }
    100% { height: 16px; }
}

@keyframes spinSlow {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}
.animate-spin-slow {
    animation: spinSlow 8s linear infinite;
}
</style>

<script>
const tracks = [
    {
        name: "Lofi Chill Radio",
        artist: "Lofi Beats for Coding",
        url: "https://stream.zeno.fm/f3wvbbqmdg8uv"
    },
    {
        name: "Synthwave Cyberpunk",
        artist: "Retro Wave Synth",
        url: "https://stream.zeno.fm/0r0xa792kwzuv"
    },
    {
        name: "Ambient Night Chill",
        artist: "Deep Focus Ambient",
        url: "https://stream.zeno.fm/f3wvbbqmdg8uv"
    }
];

let currentTrackIndex = 0;
const audio = document.getElementById('audio-element');
const playBtn = document.getElementById('play-btn');
const playIcon = document.getElementById('play-icon');
const pauseIcon = document.getElementById('pause-icon');
const trackName = document.getElementById('track-name');
const trackArtist = document.getElementById('track-artist');
const progressBar = document.getElementById('audio-progress');
const currentTimeEl = document.getElementById('current-time');
const durationTimeEl = document.getElementById('duration-time');
const eqBars = document.getElementById('eq-bars');
const musicPulseDot = document.getElementById('music-pulse-dot');

function loadTrack(index) {
    currentTrackIndex = index;
    const track = tracks[index];
    audio.src = track.url;
    trackName.textContent = track.name;
    trackArtist.textContent = track.artist;
    document.getElementById('playlist-select').value = index;
}

function togglePlay() {
    if (!audio.src) {
        loadTrack(currentTrackIndex);
    }
    if (audio.paused) {
        audio.play().then(() => {
            playIcon.classList.add('hidden');
            pauseIcon.classList.remove('hidden');
            eqBars.classList.add('playing');
            musicPulseDot.classList.remove('hidden');
        }).catch(e => console.log('Audio play blocked:', e));
    } else {
        audio.pause();
        playIcon.classList.remove('hidden');
        pauseIcon.classList.add('hidden');
        eqBars.classList.remove('playing');
        musicPulseDot.classList.add('hidden');
    }
}

function nextTrack() {
    currentTrackIndex = (currentTrackIndex + 1) % tracks.length;
    loadTrack(currentTrackIndex);
    audio.play().then(() => {
        playIcon.classList.add('hidden');
        pauseIcon.classList.remove('hidden');
        eqBars.classList.add('playing');
        musicPulseDot.classList.remove('hidden');
    }).catch(e => console.log('Audio play blocked:', e));
}

function changeTrack(index) {
    loadTrack(parseInt(index));
    audio.play().then(() => {
        playIcon.classList.add('hidden');
        pauseIcon.classList.remove('hidden');
        eqBars.classList.add('playing');
        musicPulseDot.classList.remove('hidden');
    }).catch(e => console.log('Audio play blocked:', e));
}

function toggleMute() {
    audio.muted = !audio.muted;
    document.getElementById('mute-btn').style.opacity = audio.muted ? '0.5' : '1';
}

function toggleMusicPlayer(showExpanded) {
    const musicCard = document.getElementById('music-card');
    const musicExpandBtn = document.getElementById('music-expand-btn');
    if (showExpanded) {
        musicCard.classList.remove('hidden');
        musicExpandBtn.classList.add('hidden');
    } else {
        musicCard.classList.add('hidden');
        musicExpandBtn.classList.remove('hidden');
    }
}

audio.addEventListener('timeupdate', () => {
    if (audio.duration && !isNaN(audio.duration)) {
        const progressPercent = (audio.currentTime / audio.duration) * 100;
        progressBar.value = progressPercent;
        currentTimeEl.textContent = formatTime(audio.currentTime);
        durationTimeEl.textContent = formatTime(audio.duration);
    } else {
        currentTimeEl.textContent = formatTime(audio.currentTime);
        durationTimeEl.textContent = "LIVE";
    }
});

progressBar.addEventListener('input', () => {
    if (audio.duration && !isNaN(audio.duration)) {
        audio.currentTime = (progressBar.value / 100) * audio.duration;
    }
});

function formatTime(seconds) {
    if (isNaN(seconds)) return "00:00";
    const mins = Math.floor(seconds / 60);
    const secs = Math.floor(seconds % 60);
    return `${mins < 10 ? '0' : ''}${mins}:${secs < 10 ? '0' : ''}${secs}`;
}

// Initial track setup
loadTrack(0);
</script>
