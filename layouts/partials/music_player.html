<!-- Floating Spotify & CD Audio Player Widget -->
<div id="music-player-widget" class="fixed bottom-5 right-5 z-50 font-sans transition-all duration-300">
    
    <!-- Collapsed Toggle CD Disc Button (when minimized) -->
    <button id="music-expand-btn" onclick="toggleMusicPlayer(true)" class="hidden flex items-center gap-3 bg-[#18181b]/90 text-sky-400 border border-border-primary-light dark:border-border-primary-dark p-2.5 rounded-full shadow-2xl backdrop-blur-md transition-all duration-300 hover:scale-105 group" title="Open Spotify Player">
        <!-- Mini CD Disc -->
        <div id="mini-cd-disc" class="w-9 h-9 rounded-full bg-gradient-to-tr from-neutral-900 via-neutral-700 to-neutral-900 border border-neutral-600 shadow-md flex items-center justify-center relative spin-cd playing">
            <div class="absolute inset-1 rounded-full border border-neutral-500/30"></div>
            <div class="w-3 h-3 rounded-full bg-emerald-500 border border-neutral-300 flex items-center justify-center">
                <div class="w-1 h-1 rounded-full bg-neutral-900"></div>
            </div>
        </div>
        <span class="text-xs font-semibold pr-2 text-text-primary-light dark:text-text-primary-dark flex items-center gap-1.5">
            <svg class="w-4 h-4 text-emerald-500" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm4.586 14.424c-.18.295-.563.387-.857.207-2.35-1.434-5.308-1.758-8.793-.963-.335.077-.67-.133-.746-.467-.077-.334.132-.67.467-.746 3.812-.871 7.102-.496 9.722 1.111.295.18.387.563.207.858zm1.226-2.724c-.226.367-.706.482-1.072.257-2.687-1.652-6.785-2.131-9.965-1.166-.413.125-.848-.106-.973-.519-.125-.413.106-.848.519-.973 3.632-1.102 8.147-.568 11.234 1.329.366.226.48.706.257 1.071zm.143-2.85c-3.223-1.913-8.54-2.09-11.62-1.155-.494.15-.1.016-.645-.344-.15-.494.016-1.01.494-1.16 3.536-1.073 9.404-.866 13.115 1.337.444.263.59.839.327 1.283-.263.443-.839.59-1.282.327z"/></svg>
            Spotify Playlist
        </span>
    </button>

    <!-- Expanded Music Player Card -->
    <div id="music-card" class="w-80 sm:w-96 bg-bg-secondary-light/95 dark:bg-bg-secondary-dark/95 text-text-primary-light dark:text-text-primary-dark border border-border-primary-light dark:border-border-primary-dark rounded-2xl p-3 shadow-2xl backdrop-blur-md transition-all duration-300 relative">
        
        <!-- Header Controls -->
        <div class="flex items-center justify-between mb-2 px-1">
            <div class="flex items-center gap-2">
                <!-- 360 Rotating Mini CD -->
                <div id="cd-disc" class="w-6 h-6 rounded-full bg-gradient-to-tr from-neutral-900 via-neutral-700 to-neutral-900 border border-neutral-600 shadow-md flex items-center justify-center relative spin-cd playing">
                    <div class="w-2 h-2 rounded-full bg-emerald-500 border border-neutral-300 flex items-center justify-center">
                        <div class="w-0.5 h-0.5 rounded-full bg-neutral-900"></div>
                    </div>
                </div>
                <span class="text-xs font-bold uppercase tracking-wider text-emerald-500 dark:text-emerald-400 flex items-center gap-1.5">
                    <svg class="w-4 h-4 text-emerald-500" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm4.586 14.424c-.18.295-.563.387-.857.207-2.35-1.434-5.308-1.758-8.793-.963-.335.077-.67-.133-.746-.467-.077-.334.132-.67.467-.746 3.812-.871 7.102-.496 9.722 1.111.295.18.387.563.207.858zm1.226-2.724c-.226.367-.706.482-1.072.257-2.687-1.652-6.785-2.131-9.965-1.166-.413.125-.848-.106-.973-.519-.125-.413.106-.848.519-.973 3.632-1.102 8.147-.568 11.234 1.329.366.226.48.706.257 1.071zm.143-2.85c-3.223-1.913-8.54-2.09-11.62-1.155-.494.15-.1.016-.645-.344-.15-.494.016-1.01.494-1.16 3.536-1.073 9.404-.866 13.115 1.337.444.263.59.839.327 1.283-.263.443-.839.59-1.282.327z"/></svg>
                    Spotify Playlist
                </span>
            </div>
            
            <div class="flex items-center gap-1">
                <a href="https://open.spotify.com/playlist/3D6lPoNC3a7xDffCHPJJsn" target="_blank" rel="noopener noreferrer" class="text-text-secondary-light dark:text-text-secondary-dark hover:text-emerald-500 p-1 text-xs transition-colors" title="Open in Spotify">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><path d="M15 3h6v6"/><path d="M10 14L21 3"/></svg>
                </a>
                <button onclick="toggleMusicPlayer(false)" class="text-text-secondary-light dark:text-text-secondary-dark hover:text-text-primary-light dark:hover:text-text-primary-dark transition-colors p-1" title="Minimize">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 12H6"/></svg>
                </button>
            </div>
        </div>

        <!-- Embedded Spotify Playlist Frame -->
        <div class="rounded-xl overflow-hidden shadow-inner bg-black/40">
            <iframe 
                style="border-radius:12px" 
                src="https://open.spotify.com/embed/playlist/3D6lPoNC3a7xDffCHPJJsn?utm_source=generator&theme=0" 
                width="100%" 
                height="152" 
                frameBorder="0" 
                allowfullscreen="" 
                allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" 
                loading="lazy">
            </iframe>
        </div>
    </div>
</div>

<style>
/* 360 Degree Continuous Rotating Animation for CD Disc */
@keyframes spinCD {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

.spin-cd {
    animation: spinCD 5s linear infinite;
}
</style>

<script>
function toggleMusicPlayer(showExpanded) {
    const musicCard = document.getElementById('music-card');
    const musicExpandBtn = document.getElementById('music-expand-btn');
    if (showExpanded) {
        musicCard.classList.remove('hidden');
        musicExpandBtn.classList.add('hidden');
    } else {
        musicCard.classList.add('hidden');
        musicExpandBtn.classList.remove('hidden');
    }
}
</script>
