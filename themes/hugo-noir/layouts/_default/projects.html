{{ define "main" }}
<div class="w-full md:w-3/4 lg:w-1/2 mx-auto px-4 py-12">
    <h1 class="text-3xl md:text-5xl font-bold mb-8 md:mb-12 text-text-primary-light dark:text-text-primary-dark">{{ .Title }}</h1>
    
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 max-w-4xl mx-auto">
        {{ $projectsData := index site.Data .Language.Lang "projects" }}
        {{ range $projectsData.projects }}
        <div class="project-card relative overflow-hidden rounded-xl bg-bg-secondary-light dark:bg-bg-secondary-dark border border-border-primary-light dark:border-border-primary-dark hover:border-accent-light dark:hover:border-accent-dark p-6 transition-all duration-300 group flex flex-col justify-between shadow-lg">
            <div>
                <h3 class="text-xl font-bold mb-2 text-text-primary-light dark:text-text-primary-dark group-hover:text-accent-light dark:group-hover:text-accent-dark transition-colors">{{ .title }}</h3>
                <p class="text-text-secondary-light dark:text-text-secondary-dark text-sm mb-4 leading-relaxed">{{ .description }}</p>
                <div class="flex flex-wrap gap-2 mb-6">
                    {{ $techs := split .tech "," }}
                    {{ range $tech := $techs }}
                    <span class="px-2 py-0.5 bg-bg-tertiary-light dark:bg-bg-tertiary-dark border border-border-secondary-light dark:border-border-secondary-dark rounded-md text-xs font-medium text-text-secondary-light dark:text-text-secondary-dark">{{ trim $tech " " }}</span>
                    {{ end }}
                </div>
            </div>
            <a href="{{ .link }}" class="inline-flex items-center gap-1.5 text-sm font-medium text-accent-light dark:text-accent-dark hover:underline group/btn">
                Learn More
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 transform group-hover/btn:translate-x-1 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" />
                </svg>
            </a>
        </div>
        {{ end }}
    </div>
</div>

<style>
.project-card {
    height: 100%;
    display: flex;
    flex-direction: column;
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    /* Use Tailwind theme variables for more modular approach */
    @apply bg-bg-primary-light dark:bg-bg-secondary-dark;
    backdrop-filter: blur(10px);
}

.project-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2), 0 10px 10px -5px rgba(0, 0, 0, 0.1);
    border-color: rgba(2, 132, 199, 0.5); /* accent-light with alpha */
}
html.dark .project-card:hover {
    border-color: rgba(14, 165, 233, 0.5); /* accent-dark with alpha */
}

.aspect-w-16 {
    position: relative;
    padding-bottom: 56.25%;
}

.aspect-w-16 > img {
    position: absolute;
    height: 100%;
    width: 100%;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    object-fit: cover;
    filter: saturate(1.1) contrast(1.1);
}

@media (max-width: 768px) {
    .project-card:hover {
        transform: none;
    }
    
    .project-card .group-hover\:translate-y-\[-20px\] {
        transform: translateY(-10px);
    }
}
</style>
{{ end }}
